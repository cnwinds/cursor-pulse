name: cursor-pulse

x-app-common: &app-common
  image: cursor-pulse:latest
  build:
    context: ..
    dockerfile: docker/Dockerfile
  env_file:
    - .env
  environment:
    PULSE_CONFIG: /app/config/config.yaml
  volumes:
    - ./data:/app/data
    - ./config.yaml:/app/config/config.yaml:ro
    # Mount so process restart re-reads secrets/flags (env_file alone is create-time only)
    - ./.env:/app/.env:ro
  restart: unless-stopped

services:
  # Oneshot schema migration — runs automatically on every `compose up`
  init-db:
    <<: *app-common
    container_name: cursor-pulse-init-db
    restart: "no"
    # -c is a global CLI flag (before subcommand); PULSE_CONFIG env is enough
    command: ["pulse", "init-db"]

  # Optional: docker compose --profile tools run --rm init-v2
  init-v2:
    <<: *app-common
    profiles: [tools]
    container_name: cursor-pulse-init-v2
    restart: "no"
    command: ["pulse", "init-v2", "--seed"]

  web:
    <<: *app-common
    container_name: cursor-pulse-web
    depends_on:
      init-db:
        condition: service_completed_successfully
    command:
      - pulse
      - web
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
    ports:
      - "${PULSE_WEB_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  assistant:
    <<: *app-common
    container_name: cursor-pulse-assistant
    environment:
      PULSE_CONFIG: /app/config/config.yaml
      ASSISTANT_HOST: "0.0.0.0"
      ASSISTANT_PORT: "8090"
      PULSE_BASE_URL: http://web:8080
    command: ["python", "-m", "assistant_platform", "serve"]
    depends_on:
      init-db:
        condition: service_completed_successfully
      web:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  channel:
    <<: *app-common
    container_name: cursor-pulse-channel
    command: ["pulse", "channel"]
    depends_on:
      init-db:
        condition: service_completed_successfully
      web:
        condition: service_healthy
      assistant:
        condition: service_healthy
